name: MLOps Training Pipeline
on: [push]

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    # --- AJOUTE CETTE ÉTAPE ---
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' 
    # ---------------------------

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execution du Pipeline MLRun
      run: |
        # On lance ton script workflow.py qui génère le model.pkl
        python pipeline/pipeline.py

    - name: Sauvegarder le modèle comme artefact GitHub
      uses: actions/upload-artifact@v4
      with:
        name: crop-recommendation-model
        # On indique le chemin où MLRun ou ton script a généré le fichier
        path: ./models/crop_model.pkl
        retention-days: 5 # Le fichier reste dispo 5 jours sur GitHub